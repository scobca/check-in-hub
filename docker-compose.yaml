name: "check-in-hub"
services:
  cih-postgres:
    container_name: cih-postgres
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - cih-postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cih-net

volumes:
  cih-postgres-data:

networks:
  cih-net:
    driver: bridge